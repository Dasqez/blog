<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} - Minimalistycznie Przez Życie</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #222;
      line-height: 1.6;
      background: #ffffff;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      max-width: 680px;
      margin: 50px auto;
      padding: 0 20px;
    }
    header {
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
    }
    header h1 a {
      color: #111;
      text-decoration: none;
    }
    header p {
      font-size: 0.9rem;
      color: #666;
      margin: 5px 0 20px 0;
    }
    hr {
      border: 0;
      border-top: 1px solid #eee;
    }
    article h1 {
      font-family: 'Georgia', serif;
      font-size: 2.2rem;
      color: #111;
      margin: 0 0 10px 0;
      line-height: 1.3;
    }
    .post-date {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 30px;
    }
    .post-body {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #333;
    }
    .post-body p {
      margin-bottom: 20px;
    }
    .back-link {
      display: inline-block;
      margin-top: 50px;
      color: #555;
      text-decoration: none;
      font-size: 0.95rem;
      border-bottom: 1px solid #ccc;
    }
    .back-link:hover {
      color: #000;
      border-color: #000;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <header>
      <h1><a href="/">Minimalistycznie Przez Życie</a></h1>
      <p>Małe przygody w wielkim świecie</p>
      <hr>
    </header>

    <main>
      <article>
        <h1>{{ title }}</h1>
        <div class="post-date">Opublikowano: {{ date | date: "%d.%m.%Y" }}</div>
        
        <div class="post-body">
          {{ content }}
        </div>
      </article>
      
      <a href="/" class="back-link">&larr; Powrót do strony głównej</a>
    </main>
  </div>

</body>
</html>
