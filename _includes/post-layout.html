<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} - Minimalistycznie Przez Życie</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #222;
      line-height: 1.6;
      background: #ffffff;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      max-width: 680px;
      margin: 50px auto;
      padding: 0 20px;
    }
    header {
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
    }
    header h1 a {
      color: #111;
      text-decoration: none;
    }
    header p {
      font-size: 0.9rem;
      color: #666;
      margin: 5px 0 20px 0;
    }
    hr {
      border: 0;
      border-top: 1px solid #eee;
    }
    article h1 {
      font-family: 'Georgia', serif;
      font-size: 2.2rem;
      color: #111;
      margin: 0 0 10px 0;
      line-height: 1.3;
    }
    .post-date {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 30px;
    }
    .post-body {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #333;
    }
    .post-body p {
      margin-bottom: 20px;
    }
    .back-link {
      display: inline-block;
      margin-top: 50px;
      color: #555;
      text-decoration: none;
      font-size: 0.95rem;
      border-bottom: 1px solid #ccc;
    }
    .back-link:hover {
      color: #000;
      border-color: #000;
    }

    /* STYLIZACJA LIGHTBOXA W ARTYKULE */
.lightbox-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(255, 255, 255, 0.95); /* Białe półprzezroczyste tło */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.lightbox-overlay.active {
    opacity: 1;
    pointer-events: auto;
}

.lightbox-overlay img {
    max-width: 85%;
    max-height: 85%;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    transform: scale(0.95);
    transition: transform 0.3s ease;
}

.lightbox-overlay.active img {
    transform: scale(1);
}

.lightbox-close {
    position: absolute;
    top: 30px;
    right: 40px;
    font-family: sans-serif;
    font-size: 2rem;
    color: #111;
    cursor: pointer;
}

/* Eleganckie okiełznanie zdjęć wewnątrz treści artykułu */
.post-body img {
    max-width: 100% !important;    /* Bezwzględna maksymalna szerokość tekstu */
    width: auto !important;         /* Wymuszenie zachowania proporcji */
    height: auto !important;        /* Nadpisanie domyślnych wymiarów z CMS */
    max-height: 450px !important;  /* Maksymalna wysokość, by zdjęcie nie zalało ekranu */
    display: block !important;
    margin: 2rem auto !important;  /* Wyśrodkowanie i marginesy */
    border-radius: 6px; 
    border: 1px solid #111;
    object-fit: contain !important; /* Gwarancja braku zniekształceń */
    transition: transform 0.2s ease;
    cursor: pointer;
}

/* Subtelny efekt po najechaniu myszką, sugerujący klikalność */
.post-body img:hover {
    transform: scale(1.01);
}
  </style>
</head>
<body>

  <div class="wrapper">
    <header>
      <h1><a href="/">Minimalistycznie Przez Życie</a></h1>
      <p>Małe przygody w wielkim świecie</p>
      <hr>
    </header>

    <main>
      <article>
        <h1>{{ title }}</h1>
        <div class="post-date">Opublikowano: {{ date | date: "%d.%m.%Y" }}</div>
        
        <div class="post-body">
          {{ content }}
        </div>
      </article>
      
      <a href="/" class="back-link">&larr; Powrót do strony głównej</a>
    </main>
  </div>
<div id="postLightbox" class="lightbox-overlay" onclick="closePostLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="postLightboxImg" src="" alt="Powiększenie zdjęcia">
</div>

<script>
    // 1. Automatycznie dodaj klasę i akcję kliknięcia do każdego zdjęcia w treści wpisu
    document.querySelectorAll('.post-body img').forEach(img => {
        img.style.cursor = 'pointer'; // Zmień kursor na rączkę
        img.addEventListener('click', function() {
            openPostLightbox(this.src);
        });
    });

    // 2. Logika otwierania i zamykania
    function openPostLightbox(imageSrc) {
        const lightbox = document.getElementById('postLightbox');
        const lightboxImg = document.getElementById('postLightboxImg');
        
        lightboxImg.src = imageSrc;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden'; // Blokada przewijania w tle
    }

    function closePostLightbox() {
        const lightbox = document.getElementById('postLightbox');
        lightbox.classList.remove('active');
        document.body.style.overflow = ''; // Przywrócenie przewijania
    }
</script>
</body>
</html>
