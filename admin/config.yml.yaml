backend:
  name: github
  repo: Dasquez/blog
  branch: main
  base_url: https://bramka-oauth.dave-pytel.workers.dev # Podmień na pełny adres nowego Workera

media_folder: "/"
public_folder: "/"

collections:
  - name: "blog"
    label: "Wpisy"
    folder: "posts"
    create: true
    fields:
      - { label: "Tytuł", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime" }
      - { label: "Zdjęcie wpisu", name: "image", widget: "image", required: false }
      - { label: "Treść", name: "body", widget: "markdown" }
